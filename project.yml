name: basenana
options:
  bundleIdPrefix: com.basenana
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  FeedKit:
    url: https://github.com/nmdias/FeedKit
    from: "9.1.2"
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: "2.7.2"
  Fuzi:
    url: https://github.com/cezheng/Fuzi
    from: "3.1.2"
  SwiftUIMasonry:
    url: https://github.com/ciaranrobrien/SwiftUIMasonry
    branch: main
  SwiftyBeaver:
    url: https://github.com/SwiftyBeaver/SwiftyBeaver.git
    from: "2.0.0"
  Swinject:
    url: https://github.com/Swinject/Swinject.git
    from: "2.9.0"
  Factory:
    url: https://github.com/hmlongco/Factory
    from: "2.4.0"

targets:
  BasenanaApp:
    type: application
    platform: macOS
    sources:
      - path: basenana
        excludes:
          - "**/Info.plist"
    resources:
      - path: basenana/Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: Basenana
        PRODUCT_BUNDLE_IDENTIFIER: com.basenana.app
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Domain
      - target: Data
      - target: Feature
      - target: Styleguide
      - package: SwiftyBeaver
      - package: Swinject
      - package: Factory

  Domain:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Domain
    settings:
      base:
        PRODUCT_NAME: Domain
        PRODUCT_BUNDLE_IDENTIFIER: com.basenana.domain
        GENERATE_INFOPLIST_FILE: YES

  Data:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Data
    settings:
      base:
        PRODUCT_NAME: Data
        PRODUCT_BUNDLE_IDENTIFIER: com.basenana.data
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Domain

  Feature:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Feature
    resources:
      - path: Sources/Feature/Entry/WebPage/Readability/Readability.js
      - path: Sources/Feature/Entry/WebPage/Readability/readability_images.js
      - path: Sources/Feature/Entry/WebPage/Readability/readability_initialization.js
    settings:
      base:
        PRODUCT_NAME: Feature
        PRODUCT_BUNDLE_IDENTIFIER: com.basenana.feature
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Domain
      - target: Data
      - target: Styleguide
      - package: FeedKit
      - package: SwiftUIMasonry
      - package: SwiftSoup
      - package: Fuzi

  Styleguide:
    type: framework
    platform: macOS
    sources:
      - path: Sources/Styleguide/Styleguide
    settings:
      base:
        PRODUCT_NAME: Styleguide
        PRODUCT_BUNDLE_IDENTIFIER: com.basenana.styleguide
        GENERATE_INFOPLIST_FILE: YES

  DomainTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/DomainTests
    settings:
      base:
        PRODUCT_NAME: DomainTests
        PRODUCT_BUNDLE_IDENTIFIER: com.basenana.domain.tests
        INFOPLIST_FILE: Tests/DomainTests/Info.plist
    dependencies:
      - target: Domain

  StyleguideTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/StyleguideTests
    settings:
      base:
        PRODUCT_NAME: StyleguideTests
        PRODUCT_BUNDLE_IDENTIFIER: com.basenana.styleguide.tests
        INFOPLIST_FILE: Tests/StyleguideTests/Info.plist
    dependencies:
      - target: Styleguide

  DataTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/DataTests
    settings:
      base:
        PRODUCT_NAME: DataTests
        PRODUCT_BUNDLE_IDENTIFIER: com.basenana.data.tests
        INFOPLIST_FILE: Tests/DataTests/Info.plist
    dependencies:
      - target: Data

  FeatureTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/FeatureTests
    settings:
      base:
        PRODUCT_NAME: FeatureTests
        PRODUCT_BUNDLE_IDENTIFIER: com.basenana.feature.tests
        INFOPLIST_FILE: Tests/FeatureTests/Info.plist
    dependencies:
      - target: Feature
